apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "chaos-platform.fullname" . }}
  labels:
    {{- include "chaos-platform.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "chaos-platform.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - {}
  egress:
    - {}
