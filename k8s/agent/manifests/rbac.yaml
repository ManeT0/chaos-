apiVersion: v1
kind: ServiceAccount
metadata:
  name: chaos-agent
  namespace: chaos-platform
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: chaos-agent
rules:
- apiGroups: [""]
  resources: ["pods", "nodes"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: chaos-agent
subjects:
- kind: ServiceAccount
  name: chaos-agent
  namespace: chaos-platform
roleRef:
  kind: ClusterRole
  name: chaos-agent
  apiGroup: rbac.authorization.k8s.io
