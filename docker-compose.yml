version: '3.8'

services:
  chaos-platform:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./backend/config.yaml:/app/backend/config.yaml
      - ~/.ssh:/root/.ssh:ro  # SSH keys
    environment:
      - PROMETHEUS_URL=http://prometheus:9090
    depends_on:
      - prometheus

  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./grafana/datasources:/etc/grafana/provisioning/datasources

  # test application for demo
  demo-app:
    image: nginx:alpine
    ports:
      - "8080:80"
