version: '3.8'

services:
  # ── Chaos Engineering Platform (Lite) ───────────────────────────
  chaos-platform:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./backend/config.yaml:/app/backend/config.yaml
      - chaos_data:/app/data
    environment:
      - PROMETHEUS_URL=http://localhost:9090 # default to local, user can change via UI
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

# ── Named volumes ───────────────────────────────────────────────
volumes:
  chaos_data:
    driver: local
